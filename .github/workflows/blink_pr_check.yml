name: "🔭 Blink GPU SLA Check"

# Runs on every Pull Request to main/master
on:
  pull_request:
    branches:
      - main
      - master
    paths:
      # Only trigger when model-relevant code changes
      - "**/*.py"
      - "models/**"

jobs:
  blink-sla-check:
    name: GPU Performance SLA Verification
    runs-on: ubuntu-latest   # Replace with a self-hosted GPU runner for real GPU timing

    steps:
      # ── 1. Checkout code ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ────────────────────────────────────────────────────
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      # ── 3. Install Blink and dependencies ───────────────────────────────────
      - name: Install Blink dependencies
        run: |
          pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install transformers xgboost joblib pandas numpy
          pip install -e ".[full]" || pip install -r requirements.txt

      # ── 4. Vision model SLA check (ResNet-50, latency + memory) ─────────────
      - name: "[Vision] ResNet-50 — Latency & Memory SLA"
        id: vision_check
        run: |
          python blink_github_action.py \
            --model-name    resnet50 \
            --batch-size    32 \
            --sla-latency-ms 80 \
            --sla-memory-mb  2048

      # ── 5. LLM prefill SLA check (GPT-2, TTFT + memory) ────────────────────
      - name: "[LLM] GPT-2 — Prefill (TTFT) & Memory SLA"
        id: llm_check
        run: |
          python blink_github_action.py \
            --model-name       gpt2 \
            --batch-size       1 \
            --seq-len          512 \
            --quantization-bits 16 \
            --sla-prefill-ms   2000 \
            --sla-memory-mb    4096

      # ── 6. Post SLA summary as PR comment ───────────────────────────────────
      - name: Post Blink SLA Summary Comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const vision = '${{ steps.vision_check.outcome }}' === 'success' ? '✅ PASS' : '❌ FAIL';
            const llm    = '${{ steps.llm_check.outcome }}'   === 'success' ? '✅ PASS' : '❌ FAIL';
            const body = [
              '## 🔭 Blink GPU SLA Report',
              '',
              '| Model         | Check             | Result  |',
              '|:--------------|:------------------|:--------|',
              `| ResNet-50     | Latency + Memory  | ${vision} |`,
              `| GPT-2 (fp16)  | TTFT + Memory     | ${llm}    |`,
              '',
              '> Predictions generated by [Blink](https://github.com/Aniketxmishra/Blink_Main) — a static GPU profiler. No GPU was rented to produce this report.',
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
